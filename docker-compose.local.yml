# 本地独立运行/调试底座：PG（源/目标库）+ MinIO（湖仓对象存储），可选 Doris/Kafka。
# 口令均为本机临时容器的脱敏占位，仅本地使用，禁用于任何真实环境（红线：示例脱敏）。
#
# 用法：
#   export GH_PACKAGES_USER=<github 用户名>   GH_PACKAGES_TOKEN=<带 read:packages 的 PAT>
#   docker compose -f docker-compose.local.yml up --build
# 健康检查全绿后：curl http://localhost:9084/actuator/health（actuator 在管理口 9084；业务 API 在 8084）
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: df
      POSTGRES_PASSWORD: df_local_only   # 本地占位，仅本机临时容器
      POSTGRES_DB: df_local
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U df -d df_local"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_local_only   # 本地占位，仅本机临时容器
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # 控制台
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      args:
        GH_PACKAGES_USER: ${GH_PACKAGES_USER:-}
        GH_PACKAGES_TOKEN: ${GH_PACKAGES_TOKEN:-}
    ports:
      - "8084:8084"   # 应用 HTTP（业务 API）
      - "9084:9084"   # 管理口（actuator 探针 / 外部探活）
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9084/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 40s

  # ---- 可选组件（按需取消注释）----
