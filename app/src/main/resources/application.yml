spring:
  application:
    name: data-foundation
  datasource:
    # 平台自身存储：PostgreSQL 单实例 + 本服务独立 database（df，端口 5432）。
    # 默认连本地 docker-compose.local.yml 起的 PG；生产/测试经环境变量覆盖。
    # ⚠️ 与「被连接的样例数据源」（demo MySQL 3306）职责不同、不可混用。
    url: ${DATA_FOUNDATION_DB_URL:jdbc:postgresql://localhost:5432/df_local}
    username: ${DATA_FOUNDATION_DB_USER:df}
    password: ${DATA_FOUNDATION_DB_PASSWORD:df_local_only}
  jpa:
    # schema 由 Flyway 管理，JPA 不做 DDL（仅校验映射与库一致）。
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8084}            # 应用 HTTP（平台基线 80xx）

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:9084}   # actuator 独立管理端口（平台基线 90xx）；/actuator/** 迁至此口
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true   # /actuator/health/liveness | /readiness（容器探针）

hashmatrix:
  tenant:
    # 信任边缘网关已强制注入并校验租户头（icd/tenant-context-headers §4）；服务侧默认不强制。
    # 前提：服务仅在网关之后可达（NetworkPolicy）。
    required: false
  datasource:
    crypto:
      # D7 主密钥：AES-256-GCM 主密钥（Base64 编码 32 字节），**部署期经 env/K8s Secret 注入、绝不入库**。
      # 缺省为空 → CryptoService 启动即 fail-fast（拒绝无密钥起服务）。本地经 docker-compose 注入脱敏占位。
      secret-key: ${DS_SECRET_KEY:}
