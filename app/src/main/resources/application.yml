spring:
  application:
    name: data-foundation

server:
  port: ${SERVER_PORT:8084}            # 应用 HTTP（平台基线 80xx）

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:9084}   # actuator 独立管理端口（平台基线 90xx）；/actuator/** 迁至此口
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true   # /actuator/health/liveness | /readiness（容器探针）

hashmatrix:
  tenant:
    # 信任边缘网关已强制注入并校验租户头（icd/tenant-context-headers §4）；服务侧默认不强制。
    # 前提：服务仅在网关之后可达（NetworkPolicy）。
    required: false
